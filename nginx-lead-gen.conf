# =============================================================================
# nginx-lead-gen.conf
#
# Complete nginx config — includes all existing apps plus LeadGen Pro.
#
# Deploy:
#   sudo cp nginx-lead-gen.conf /etc/nginx/sites-available/lead-gen.conf
#   sudo ln -sf /etc/nginx/sites-available/lead-gen.conf \
#               /etc/nginx/sites-enabled/lead-gen.conf
#   sudo nginx -t && sudo systemctl reload nginx
#
# If you use a single default config instead of sites-enabled, replace your
# existing /etc/nginx/sites-available/default with this file.
# =============================================================================

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ===== LUMEN UI (STATIC BUILD) =====
    location /lumen/ {
        alias /root/apps/echo-post-frontend/out/;
        index index.html;
        try_files $uri $uri/ /lumen/index.html;
    }

    location = /lumen {
        return 301 /lumen/;
    }

    # ===== SMAT SERVER (API) =====
    location = /smat-server {
        return 301 /smat-server/;
    }

    location /smat-server/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ===== GRAFANA =====
    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support — required for Grafana live dashboards
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Rewrite Location headers that Grafana emits with localhost so the
        # browser is redirected to the real public domain instead.
        proxy_redirect http://localhost/ https://buildwithkulshresth.com/;
        proxy_redirect http://127.0.0.1:3000/ https://buildwithkulshresth.com/grafana/;
    }

    # ===== SESSION LOGGER =====
    location = /session-logger {
        return 301 /session-logger/;
    }

    # React SPA + static assets (served by Express from frontend/dist)
    location /session-logger/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # REST API (same Express process, separate prefix)
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== LEAD-GEN CLIENT (React + Vite SPA) =====
    # Static files built with: vite build --base /lead-client/
    # Deployed to:             /root/apps/lead-gen/client/dist/

    location = /lead-client {
        return 301 /lead-client/;
    }

    location /lead-client/ {
        alias /root/apps/lead-gen/client/dist/;
        index index.html;
        # Serve built assets by exact path, fall back to SPA index for
        # client-side routes (React Router handles /lead-client/<route>)
        try_files $uri $uri/ /lead-client/index.html;
    }

    # ===== LEAD-GEN SERVER (Node.js API + Socket.IO on port 3002) =====
    # The trailing slash on proxy_pass strips the /lead-server/ prefix so
    # Express receives the original paths (/api/leads, /socket.io/…).

    location = /lead-server {
        return 301 /lead-server/;
    }

    location /lead-server/ {
        proxy_pass         http://127.0.0.1:3002/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support — required for Socket.IO
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        # Allow long-lived Socket.IO connections
        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # ===== DEFAULT FALLBACK =====
    location / {
        root /var/www/tic-tac-toe;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
