server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ===== LUMEN UI (STATIC BUILD) =====
    location /lumen/ {
        alias /root/apps/echo-post-frontend/out/;
        index index.html;
        try_files $uri $uri/ /lumen/index.html;
    }

    location = /lumen {
        return 301 /lumen/;
    }

    # ===== SMAT SERVER (API) =====
    location = /smat-server {
        return 301 /smat-server/;
    }

    location /smat-server/ {
        proxy_pass http://127.0.0.1:8090/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    }

    # ===== GRAFANA =====
    location = /grafana {
        return 301 /grafana/;
    }

    location /grafana/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_redirect http://localhost/ https://buildwithkulshresth.com/;
        proxy_redirect http://127.0.0.1:3000/ https://buildwithkulshresth.com/grafana/;
    }

    # ===== SESSION LOGGER =====
    location = /session-logger {
        return 301 /session-logger/;
    }

    location /session-logger/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== DRIP (Lead-Gen React + Vite SPA) =====
    # Built with: vite build --base /drip/
    # Deployed to: /root/apps/lead-gen/client/dist/

    location = /drip {
        return 301 /drip/;
    }

    location /drip/ {
        alias /root/apps/lead-gen/client/dist/;
        index index.html;
        try_files $uri $uri/ /drip/index.html;
    }

    # ===== DRIP-API (Lead-Gen Node.js + Socket.IO on port 3002) =====

    location = /drip-api {
        return 301 /drip-api/;
    }

    location /drip-api/ {
        proxy_pass         http://127.0.0.1:3002/;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  86400;
        proxy_send_timeout  86400;
    }

    # ===== DEFAULT FALLBACK =====
    location / {
        root /var/www/tic-tac-toe;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
